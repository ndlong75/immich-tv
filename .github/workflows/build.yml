name: Build Immich TV APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]        # Trigger release on version tags like v1.0.0
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write          # Needed to create releases

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/immich-tv-${VERSION}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: immich-tv-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Create GitHub Release when a version tag is pushed
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/immich-tv-${{ github.ref_name }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false
